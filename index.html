<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEVO V10</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MEEVO V10</h1>
<p>Exame físico inteligente</p>

<label>Paciente</label>
<input id="paciente">

<label>Sexo</label>
<select id="sexo">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>

<h3>GERAL</h3>
<div class="chips" id="estado">
<button>EGB</button>
<button>Regular</button>
<button>Ruim</button>
</div>

<div class="chips" id="hidratacao">
<button>Hidratado</button>
<button>Desidratado</button>
</div>

<div id="desidratacao_grau" class="hidden chips">
<button>+</button><button>++</button><button>+++</button><button>++++</button>
</div>

<h3>AN</h3>
<div class="chips" id="consciencia">
<button>Vigil</button>
<button>Sonolento</button>
<button>Obnubilado</button>
<button>Coma</button>
<button>Sedado</button>
</div>

<div id="glasgow" class="hidden">
<p>Glasgow</p>
<div class="chips" id="g_ao">
<button>4</button><button>3</button><button>2</button><button>1</button>
</div>
<div class="chips" id="g_rv">
<button>5</button><button>4</button><button>3</button><button>2</button><button>1</button>
</div>
<div class="chips" id="g_rm">
<button>6</button><button>5</button><button>4</button><button>3</button><button>2</button><button>1</button>
</div>
</div>

<h3>Resultado</h3>
<pre id="saida"></pre>

<button onclick="gerar()">Gerar texto</button>

<script src="app.js"></script>
</body>
</html>
